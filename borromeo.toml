# borromeo policy spine — the single source of declared invariants for this repo.
# Declared once here, enforced on every gate run (config-compliance: every required
# check must produce a pass receipt). See docs/SPEC-spine.md and docs/adr/0010-*.md.

[project]
# What borromeo targets in THIS governed project (portability — see ADR-0013).
language = "python"  # selects checks/python/ (+ checks/shared/); see ADR-0015
package = "meta_harness"
src_dir = "src"
tests_dir = "tests"

[checks]
# The required check set (replaces checks/manifest.json as the single source of truth).
required = [
  "00_build",
  "05_hygiene",
  "10_format",
  "20_lint",
  "30_typecheck",
  "40_test",
  "50_security",
]

[hygiene]
# The engineering surround this project must have (presence-gated; see ADR-0012).
# borromeo enforces these the same way it enforces code quality.
requires = [
  "README.md",
  "LICENSE",
  "AGENTS.md",
  "pyproject.toml",
  "verify.sh",
  "docs",
  ".github/workflows",
  "Dockerfile",
]

[context]
# Declared operating context. borromeo surfaces this to the wrapped agent (e.g. for prompt
# rewriting — the next build) so the user's intent is preserved and improved per the declared
# context, every run. Declaring it here applies it consistently instead of restating it ad hoc.
account = "3MagicLabs/borromeo"
# Value priorities guide trade-offs, highest first. Consumed by prompt rewriting.
value_priorities = ["correctness", "security", "maintainability", "performance"]

[prompt_rewriting]
# When enabled, borromeo's UserPromptSubmit hook injects a directive asking the wrapped
# agent to rewrite the user's prompt (preserve+improve intent) using the context above,
# and to SHOW the rewrite before proceeding. borromeo enforces it; the agent performs it.
enabled = true
