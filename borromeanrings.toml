# borromeanRings policy spine — the single source of declared invariants for this repo.
# Declared once here, enforced on every gate run (config-compliance: every required
# check must produce a pass receipt). See docs/specs/SPEC-spine.md and docs/adr/0010-*.md.

[project]
# What borromeanRings targets in THIS governed project (portability — see ADR-0013).
language = "python"  # selects checks/python/ (+ checks/shared/); see ADR-0015
package = "meta_harness"
src_dir = "src"
tests_dir = "tests"

[git]
# Declared commit identity (the maintainer's — configurable, NOT a contributor
# requirement). On THIS public repo, identity is enforced by the local PreToolUse guard
# ONLY: 06_git_identity is deliberately omitted from [checks].required below, so external
# contributors commit under their own identity and still pass CI. The guard stays a local
# aid for whoever has borromeanRings installed. Empty/absent ⇒ guard off too. Other projects
# may still require 06_git_identity. See docs/specs/SPEC-git-identity.md and
# docs/adr/0019-git-identity-local-guard-only-public-repo.md.
name = "wimaan3"
email = "imaansoltan@gmail.com"

[layout]
# File-organization conventions, enforced by check 07_layout (fail-closed). Each
# rule is opt-in (empty/zero ⇒ off). See docs/specs/SPEC-layout.md and ADR-0018.
specs_dir = "docs/specs"                                # every SPEC*.md must live here
root_doc_allowlist = ["README.md", "AGENTS.md", "PLAN-v0.md"]  # the only .md allowed at repo root
test_grouping_threshold = 15                            # > N flat test files ⇒ group by type
test_groups = ["unit", "integration", "e2e"]

[checks]
# The required check set (replaces checks/manifest.json as the single source of truth).
required = [
  "00_build",
  "05_hygiene",
  # 06_git_identity intentionally omitted: this public repo enforces identity via the
  # local guard only, so external contributors pass CI. See [git] above + ADR-0019.
  "07_layout",
  "10_format",
  "20_lint",
  "30_typecheck",
  "40_test",
  "50_security",
]

[hygiene]
# The engineering surround this project must have (presence-gated; see ADR-0012).
# borromeanRings enforces these the same way it enforces code quality.
requires = [
  "README.md",
  "LICENSE",
  "AGENTS.md",
  "pyproject.toml",
  "verify.sh",
  "docs",
  ".github/workflows",
  "Dockerfile",
]

[context]
# Declared operating context. borromeanRings surfaces this to the wrapped agent (e.g. for prompt
# rewriting — the next build) so the user's intent is preserved and improved per the declared
# context, every run. Declaring it here applies it consistently instead of restating it ad hoc.
account = "3MagicLabs/borromeanrings"
# Value priorities guide trade-offs, highest first. Consumed by prompt rewriting.
value_priorities = ["correctness", "security", "maintainability", "performance"]

[prompt_rewriting]
# When enabled, borromeanRings's UserPromptSubmit hook injects a directive asking the wrapped
# agent to rewrite the user's prompt (preserve+improve intent) using the context above,
# and to SHOW the rewrite before proceeding. borromeanRings enforces it; the agent performs it.
enabled = true
